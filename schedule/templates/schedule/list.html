{% extends "base.html" %}

{% block content %}

<h2>📅 Занятия</h2>

<a class="btn" href="/lessons/create/">Создать занятие</a>

{% for lesson in lessons %}
    <div class="card">
        <strong>{{ lesson.group.name }}</strong><br>

        📅 {{ lesson.date }}  
        🕒 {{ lesson.time }}

        <br><br>

        <a class="btn" href="/attendance/mark/{{ lesson.id }}/">
            📊 Отметить посещаемость
        </a>
    </div>
{% empty %}
    <p>Занятий пока нет</p>
{% endfor %}

{% endblock %}
